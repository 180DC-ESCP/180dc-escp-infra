services:
  postgresql:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    container_name: authentik-db
    restart: unless-stopped
    mem_limit: ${AUTHENTIK_DB_MEMORY_LIMIT:-400m}
    pids_limit: ${AUTHENTIK_DB_PIDS_LIMIT:-150}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
      POSTGRES_USER: ${PG_USER:-authentik}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - database:/var/lib/postgresql
    networks:
      - authentik-internal

  server:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:2026.5.3}
    container_name: authentik-server
    restart: unless-stopped
    mem_limit: ${AUTHENTIK_SERVER_MEMORY_LIMIT:-900m}
    pids_limit: ${AUTHENTIK_SERVER_PIDS_LIMIT:-250}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    command: server
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      BASE_DOMAIN: ${BASE_DOMAIN:?base domain required}
      AUTHENTIK_ALLOWED_EMAIL_DOMAIN: ${AUTHENTIK_ALLOWED_EMAIL_DOMAIN:?allowed email domain required}
      AUTHENTIK_BASE_URL: ${AUTHENTIK_BASE_URL:?base URL required}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:?platform admin required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?google client id required}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:?google client secret required}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-localhost}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-25}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-false}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-}
    depends_on:
      postgresql:
        condition: service_healthy
    shm_size: 512mb
    volumes:
      - ./data:/data
      - ./custom-templates:/templates
    networks:
      - caddy-authentik
      - authentik-internal

  worker:
    image: ${AUTHENTIK_IMAGE:-ghcr.io/goauthentik/server:2026.5.3}
    container_name: authentik-worker
    restart: unless-stopped
    mem_limit: ${AUTHENTIK_WORKER_MEMORY_LIMIT:-600m}
    pids_limit: ${AUTHENTIK_WORKER_PIDS_LIMIT:-250}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    command: worker
    user: root
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
      BASE_DOMAIN: ${BASE_DOMAIN:?base domain required}
      AUTHENTIK_ALLOWED_EMAIL_DOMAIN: ${AUTHENTIK_ALLOWED_EMAIL_DOMAIN:?allowed email domain required}
      AUTHENTIK_BASE_URL: ${AUTHENTIK_BASE_URL:?base URL required}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:?platform admin required}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:?google client id required}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:?google client secret required}
      AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED:-false}
      AUTHENTIK_EMAIL__HOST: ${AUTHENTIK_EMAIL__HOST:-localhost}
      AUTHENTIK_EMAIL__PORT: ${AUTHENTIK_EMAIL__PORT:-25}
      AUTHENTIK_EMAIL__USERNAME: ${AUTHENTIK_EMAIL__USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${AUTHENTIK_EMAIL__PASSWORD:-}
      AUTHENTIK_EMAIL__USE_TLS: ${AUTHENTIK_EMAIL__USE_TLS:-false}
      AUTHENTIK_EMAIL__FROM: ${AUTHENTIK_EMAIL__FROM:-}
    depends_on:
      postgresql:
        condition: service_healthy
    shm_size: 512mb
    volumes:
      - ./data:/data
      - ./certs:/certs
      - ./custom-templates:/templates
    networks:
      - authentik-internal

volumes:
  database:
    name: authentik_database

networks:
  caddy-authentik:
    external: true
  authentik-internal:
    driver: bridge
