services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    container_name: n8n-db
    restart: unless-stopped
    mem_limit: ${N8N_DB_MEMORY_LIMIT:-256m}
    pids_limit: ${N8N_DB_PIDS_LIMIT:-100}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-internal

  n8n:
    image: ${N8N_IMAGE:-n8nio/n8n:2.26.4}
    container_name: n8n
    restart: unless-stopped
    mem_limit: ${N8N_MEMORY_LIMIT:-700m}
    pids_limit: ${N8N_PIDS_LIMIT:-200}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      - N8N_EMAIL_MODE=${N8N_EMAIL_MODE}
      - N8N_SMTP_HOST=${N8N_SMTP_HOST}
      - N8N_SMTP_PORT=${N8N_SMTP_PORT}
      - N8N_SMTP_USER=${N8N_SMTP_USER}
      - N8N_SMTP_PASS=${N8N_SMTP_PASS}
      - N8N_SMTP_SENDER=${N8N_SMTP_SENDER}
      - N8N_SMTP_SSL=${N8N_SMTP_SSL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
      - N8N_ADDITIONAL_NON_UI_ROUTES=auth
      - EXTERNAL_HOOK_FILES=/home/node/.n8n/authentik-sso-hook.js
      - AUTHENTIK_ALLOWED_EMAIL_DOMAIN=${AUTHENTIK_ALLOWED_EMAIL_DOMAIN}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL}
      - SSO_SHARED_SECRET=${N8N_SSO_SECRET:?n8n sso secret required}
    env_file:
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./authentik-sso-hook.js:/home/node/.n8n/authentik-sso-hook.js:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5678/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - caddy-n8n
      - n8n-internal

volumes:
  postgres_data:
    name: n8n_postgres_data
  n8n_data:
    name: n8n_n8n_data

networks:
  caddy-n8n:
    external: true
  n8n-internal:
    driver: bridge
