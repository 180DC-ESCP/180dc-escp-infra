services:
  postgres:
    image: postgres:18.4-alpine
    container_name: n8n-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - ../config.env
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - n8n-internal

  n8n:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-2.26.4}
    container_name: n8n
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      - N8N_EMAIL_MODE=${N8N_EMAIL_MODE}
      - N8N_SMTP_HOST=${N8N_SMTP_HOST}
      - N8N_SMTP_PORT=${N8N_SMTP_PORT}
      - N8N_SMTP_USER=${N8N_SMTP_USER}
      - N8N_SMTP_PASS=${N8N_SMTP_PASS}
      - N8N_SMTP_SENDER=${N8N_SMTP_SENDER}
      - N8N_SMTP_SSL=${N8N_SMTP_SSL}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      - N8N_PROXY_HOPS=${N8N_PROXY_HOPS:-1}
      - N8N_ADDITIONAL_NON_UI_ROUTES=auth
      - EXTERNAL_HOOK_FILES=/home/node/.n8n/authentik-sso-hook.js
      - AUTHENTIK_ALLOWED_EMAIL_DOMAIN=${AUTHENTIK_ALLOWED_EMAIL_DOMAIN}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL}
    env_file:
      - ../config.env
      - .env
    volumes:
      - n8n_data:/home/node/.n8n
      - ./authentik-sso-hook.js:/home/node/.n8n/authentik-sso-hook.js:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - n8n-internal

volumes:
  postgres_data:
  n8n_data:

networks:
  proxy:
    external: true
  n8n-internal:
    driver: bridge
