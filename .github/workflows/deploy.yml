name: Manage production server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Ansible
        run: |
          python -m pip install --disable-pip-version-check ansible-core==2.19.4 ansible-lint==25.11.1
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate repository syntax
        run: |
          set -euo pipefail
          for file in scripts/*.sh backups/*.sh; do bash -n "$file"; done
          python -m compileall -q authentik vexa odoo/addons/student_society
          node --check n8n/authentik-sso-hook.js
          ansible-lint ansible

      - name: Validate Compose files
        run: bash scripts/validate-compose.sh

      - name: Validate image references
        run: bash scripts/validate-images.sh

      - name: Configure deployment inputs
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ vars.DEPLOY_KNOWN_HOSTS }}
          PRODUCTION_SECRETS: ${{ secrets.PRODUCTION_SECRETS }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          test -n "$PRODUCTION_SECRETS"
          PRODUCTION_SECRETS_FILE="$RUNNER_TEMP/production-secrets.yml"
          echo "PRODUCTION_SECRETS_FILE=$PRODUCTION_SECRETS_FILE" >> "$GITHUB_ENV"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          printf '%s\n' "$PRODUCTION_SECRETS" > "$PRODUCTION_SECRETS_FILE"
          chmod 600 "$PRODUCTION_SECRETS_FILE"
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          echo "DEPLOY_PUBLIC_KEY=$(cat ~/.ssh/deploy_key.pub)" >> "$GITHUB_ENV"

      - name: Validate playbook syntax
        run: ansible-playbook ansible/site.yml --syntax-check

      - name: Apply production configuration
        run: >-
          ansible-playbook ansible/site.yml
          --private-key ~/.ssh/deploy_key

      - name: Remove temporary secrets
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/deploy_key.pub "$PRODUCTION_SECRETS_FILE"
