---
- name: Restart SSH
  ansible.builtin.systemd_service:
    name: ssh
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    state: restarted

- name: Restart node exporter
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    state: restarted
