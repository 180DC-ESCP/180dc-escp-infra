---
- name: Validate supported host
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'Debian'
      - ansible_distribution in ['Debian', 'Ubuntu']

- name: Install host baseline packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - fail2ban
      - git
      - gnupg
      - python3
      - python3-debian
      - python3-docker
      - rsync
      - sudo
      - ufw
      - unattended-upgrades
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Install minimal node exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
    install_recommends: false

- name: Remove optional node exporter collector bundle
  ansible.builtin.apt:
    name: prometheus-node-exporter-collectors
    state: absent

- name: Set host timezone
  community.general.timezone:
    name: "{{ host_timezone }}"

- name: Ensure deployment user exists
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true
    groups: sudo
    append: true

- name: Manage deployment SSH key
  ansible.posix.authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ ([deploy_public_key] + operator_public_keys) | reject('equalto', '') | join('\n') }}"
    exclusive: true

- name: Ensure homeserver monitoring user exists
  ansible.builtin.user:
    name: "{{ hs_monitor_user }}"
    shell: /usr/sbin/nologin
    create_home: true
    system: true

- name: Manage homeserver monitoring SSH key
  ansible.posix.authorized_key:
    user: "{{ hs_monitor_user }}"
    key: "{{ hs_monitor_public_key }}"
    key_options: 'no-agent-forwarding,no-X11-forwarding,no-pty,permitopen="127.0.0.1:443",permitopen="127.0.0.1:9100"'
    exclusive: true

- name: Bind node exporter to localhost
  ansible.builtin.copy:
    dest: /etc/default/prometheus-node-exporter
    owner: root
    group: root
    mode: "0644"
    content: |
      ARGS="--web.listen-address=127.0.0.1:9100 --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/credentials/.+|var/lib/docker/.+|var/lib/containers/storage/.+)($|/)"
  notify: Restart node exporter

- name: Enable node exporter
  ansible.builtin.systemd_service:
    name: prometheus-node-exporter
    enabled: true
    state: started

- name: Manage deployment sudo policy
  ansible.builtin.copy:
    dest: /etc/sudoers.d/90-deploy
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Allow trusted homeserver monitoring SSH source
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    port: "{{ ssh_port }}"
    proto: tcp
    comment: homeserver-monitoring
  loop: "{{ hs_monitor_source_ips }}"

- name: Allow SSH before enabling firewall
  community.general.ufw:
    rule: limit
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow public web ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    - {port: "80", proto: tcp}
    - {port: "443", proto: tcp}
    - {port: "443", proto: udp}

- name: Set default incoming firewall policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing firewall policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable firewall
  community.general.ufw:
    state: enabled

- name: Manage SSH hardening
  ansible.builtin.template:
    src: ssh-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/90-180dc.conf
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Restart SSH

- name: Manage fail2ban SSH policy
  ansible.builtin.template:
    src: fail2ban-sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban
  ansible.builtin.systemd_service:
    name: fail2ban
    enabled: true
    state: started

- name: Manage unattended upgrades
  ansible.builtin.copy:
    src: 20auto-upgrades
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"

- name: Inspect swap file
  ansible.builtin.stat:
    path: /swapfile
  register: host_swap_file

- name: Allocate swap file
  ansible.builtin.command:
    cmd: "fallocate -l {{ swap_size_mb }}M /swapfile"
  when: not host_swap_file.stat.exists
  changed_when: true

- name: Protect swap file
  ansible.builtin.file:
    path: /swapfile
    owner: root
    group: root
    mode: "0600"

- name: Format new swap file
  ansible.builtin.command:
    cmd: mkswap /swapfile
  when: not host_swap_file.stat.exists
  changed_when: true

- name: Enable persistent swap
  ansible.posix.mount:
    path: none
    src: /swapfile
    fstype: swap
    opts: sw
    state: present

- name: Inspect active swap
  ansible.builtin.command: swapon --show=NAME --noheadings
  register: host_active_swap
  changed_when: false

- name: Activate swap
  ansible.builtin.command:
    cmd: swapon /swapfile
  when: "'/swapfile' not in host_active_swap.stdout_lines"
  changed_when: true

- name: Create managed root directory
  ansible.builtin.file:
    path: "{{ live_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
