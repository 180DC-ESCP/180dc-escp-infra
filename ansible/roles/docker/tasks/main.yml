---
- name: Create apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Docker repository key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Configure Docker repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - "https://download.docker.com/linux/{{ ansible_distribution | lower }}"
    suites:
      - "{{ ansible_distribution_release }}"
    components:
      - stable
    architectures:
      - "{{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Install Docker Engine and Compose
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Manage Docker daemon settings
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "live-restore": true
      }
  notify: Restart Docker

- name: Apply Docker daemon changes
  ansible.builtin.meta: flush_handlers

- name: Enable Docker
  ansible.builtin.systemd_service:
    name: docker
    enabled: true
    state: started

- name: Create Caddy-facing Docker networks
  community.docker.docker_network:
    name: "{{ item }}"
    state: present
  loop: "{{ caddy_networks }}"
