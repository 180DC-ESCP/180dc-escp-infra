services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    container_name: vexa-db
    restart: unless-stopped
    mem_limit: ${VEXA_DB_MEMORY_LIMIT:-256m}
    pids_limit: ${VEXA_DB_PIDS_LIMIT:-100}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${DB_NAME:-vexa}
      POSTGRES_USER: ${DB_USER:-vexa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?database password required}
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=60000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - vexa-internal

  whisper:
    image: ${WHISPER_IMAGE:-hwdsl2/whisper-server@sha256:428b733c043cb8e1a19a7a7dd17014a2529c32fb79ebcc29e91582118b42ba41}
    container_name: vexa-whisper
    restart: unless-stopped
    mem_limit: ${VEXA_WHISPER_MEMORY_LIMIT:-1g}
    pids_limit: ${VEXA_WHISPER_PIDS_LIMIT:-150}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-auto}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_THREADS: ${WHISPER_THREADS:-2}
      WHISPER_PORT: 9000
    volumes:
      - whisper_data:/var/lib/whisper
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/docs', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - vexa-internal

  vexa-lite:
    image: ${VEXA_IMAGE:-vexaai/vexa-lite@sha256:4752bc3cfe4c6a9a334018fe3f7c6a21f56616cd1de370d0c2c9f577206a36ec}
    container_name: vexa-lite
    restart: unless-stopped
    mem_limit: ${VEXA_MEMORY_LIMIT:-1400m}
    pids_limit: ${VEXA_PIDS_LIMIT:-250}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    shm_size: 2gb
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vexa}:${DB_PASSWORD:?database password required}@postgres:5432/${DB_NAME:-vexa}
      DB_PASSWORD: ${DB_PASSWORD:?database password required}
      DB_SSL_MODE: disable
      REDIS_URL: redis://localhost:6379/0
      ADMIN_API_TOKEN: ${ADMIN_TOKEN:?admin token required}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?admin token required}
      VEXA_API_URL: http://vexa-lite:8056
      VEXA_ADMIN_API_KEY: ${ADMIN_TOKEN:?admin token required}
      NEXT_PUBLIC_APP_URL: https://vexa.${BASE_DOMAIN:-180dc-escp.org}
      VEXA_AUTH_COOKIE_NAME: vexa-token-lite
      VEXA_USER_INFO_COOKIE_NAME: vexa-user-info-lite
      TRANSCRIPTION_SERVICE_URL: ${TRANSCRIPTION_SERVICE_URL:-http://whisper:9000/v1/audio/transcriptions}
      TRANSCRIPTION_SERVICE_TOKEN: ${TRANSCRIPTION_SERVICE_TOKEN:-local-whisper}
      TRANSCRIBER_URL: ${TRANSCRIBER_URL:-http://whisper:9000/v1/audio/transcriptions}
      TRANSCRIBER_API_KEY: ${TRANSCRIBER_API_KEY:-local-whisper}
      OPENAI_API_KEY: ${TRANSCRIPTION_SERVICE_TOKEN:-local-whisper}
      SKIP_TRANSCRIPTION_CHECK: ${SKIP_TRANSCRIPTION_CHECK:-false}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: /var/lib/vexa/recordings
      PIPER_VOICES_DIR: /app/voices
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - recordings:/var/lib/vexa/recordings
      - tts_voices:/app/voices
    depends_on:
      postgres:
        condition: service_healthy
      whisper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8056/docs >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - caddy-vexa
      - vexa-internal

  vexa-sso:
    image: ${VEXA_SSO_IMAGE:-python:3.14.6-alpine}
    container_name: vexa-sso
    restart: unless-stopped
    mem_limit: ${VEXA_SSO_MEMORY_LIMIT:-128m}
    pids_limit: ${VEXA_SSO_PIDS_LIMIT:-50}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      PORT: 8080
      VEXA_ADMIN_API_URL: http://vexa-lite:8056
      VEXA_ADMIN_API_KEY: ${ADMIN_TOKEN:?admin token required}
      VEXA_AUTH_COOKIE_NAME: vexa-token-lite
      VEXA_USER_INFO_COOKIE_NAME: vexa-user-info-lite
      SSO_SHARED_SECRET: ${VEXA_SSO_SECRET:?vexa sso secret required}
      VEXA_SSO_MAX_CONCURRENT_BOTS: ${VEXA_SSO_MAX_CONCURRENT_BOTS:-1}
      VEXA_SSO_TOKEN_SCOPES: ${VEXA_SSO_TOKEN_SCOPES:-bot,tx,browser}
    command: ["python", "/app/sso-bridge.py"]
    volumes:
      - ./sso-bridge.py:/app/sso-bridge.py:ro
    depends_on:
      vexa-lite:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - caddy-vexa
      - vexa-internal

volumes:
  postgres_data:
    name: vexa_postgres_data
  recordings:
    name: vexa_recordings
  tts_voices:
    name: vexa_tts_voices
  whisper_data:
    name: vexa_whisper_data

networks:
  caddy-vexa:
    external: true
  vexa-internal:
    driver: bridge
