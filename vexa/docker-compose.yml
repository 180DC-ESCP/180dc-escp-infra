services:
  postgres:
    image: postgres:17-alpine
    container_name: vexa-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${DB_NAME:-vexa}
      POSTGRES_USER: ${DB_USER:-vexa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:?database password required}}
    command:
      - postgres
      - -c
      - idle_in_transaction_session_timeout=60000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vexa-internal

  vexa-lite:
    image: vexaai/vexa-lite:${IMAGE_TAG:-latest}
    container_name: vexa-lite
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    shm_size: 2gb
    ports:
      - "127.0.0.1:8056:8056"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-vexa}:${DB_PASSWORD:-${POSTGRES_PASSWORD:?database password required}}@postgres:5432/${DB_NAME:-vexa}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:?database password required}}
      DB_SSL_MODE: disable
      REDIS_URL: redis://localhost:6379/0
      ADMIN_API_TOKEN: ${ADMIN_TOKEN:?admin token required}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?admin token required}
      VEXA_API_URL: http://vexa-lite:8056
      VEXA_ADMIN_API_KEY: ${ADMIN_TOKEN:?admin token required}
      NEXT_PUBLIC_APP_URL: https://vexa.180dc-escp.org
      VEXA_AUTH_COOKIE_NAME: vexa-token-lite
      VEXA_USER_INFO_COOKIE_NAME: vexa-user-info-lite
      TRANSCRIPTION_SERVICE_URL: ${TRANSCRIPTION_SERVICE_URL:?transcription service url required}
      TRANSCRIPTION_SERVICE_TOKEN: ${TRANSCRIPTION_SERVICE_TOKEN:?transcription service token required}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_DIR: /var/lib/vexa/recordings
      PIPER_VOICES_DIR: /app/voices
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - recordings:/var/lib/vexa/recordings
      - tts_voices:/app/voices
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy
      - vexa-internal

  vexa-sso:
    image: python:3.12-alpine
    container_name: vexa-sso
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      PORT: 8080
      VEXA_ADMIN_API_URL: http://vexa-lite:8056
      VEXA_ADMIN_API_KEY: ${ADMIN_TOKEN:?admin token required}
      VEXA_AUTH_COOKIE_NAME: vexa-token-lite
      VEXA_USER_INFO_COOKIE_NAME: vexa-user-info-lite
      AUTHENTIK_ALLOWED_EMAIL_DOMAIN: ${AUTHENTIK_ALLOWED_EMAIL_DOMAIN:-180dc.org}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-escp@180dc.org}
      VEXA_SSO_MAX_CONCURRENT_BOTS: ${VEXA_SSO_MAX_CONCURRENT_BOTS:-1}
      VEXA_SSO_TOKEN_SCOPES: ${VEXA_SSO_TOKEN_SCOPES:-bot,tx,browser}
    command: ["python", "/app/sso-bridge.py"]
    volumes:
      - ./sso-bridge.py:/app/sso-bridge.py:ro
    depends_on:
      vexa-lite:
        condition: service_started
    networks:
      - proxy
      - vexa-internal

volumes:
  postgres_data:
  recordings:
  tts_voices:

networks:
  proxy:
    external: true
  vexa-internal:
    driver: bridge
