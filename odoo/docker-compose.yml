services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:18.4-alpine}
    container_name: odoo-db
    restart: unless-stopped
    mem_limit: ${ODOO_DB_MEMORY_LIMIT:-256m}
    pids_limit: ${ODOO_DB_PIDS_LIMIT:-100}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-student_society}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?database password required}
    volumes:
      - odoo-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - odoo-internal

  odoo:
    image: ${ODOO_IMAGE:-odoo:19.0-20260609}
    container_name: odoo
    restart: unless-stopped
    mem_limit: ${ODOO_MEMORY_LIMIT:-512m}
    pids_limit: ${ODOO_PIDS_LIMIT:-150}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?database password required}
      SSO_SHARED_SECRET: ${ODOO_SSO_SECRET:?odoo sso secret required}
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    command:
      - odoo
      - server
      - -d
      - ${ODOO_DATABASE:-student_society}
      - --proxy-mode
      - --db_host=db
      - --db_user=${POSTGRES_USER:-odoo}
      - --db_password=${POSTGRES_PASSWORD:?database password required}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8069/web/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - caddy-odoo
      - odoo-internal

  init:
    image: ${ODOO_IMAGE:-odoo:19.0-20260609}
    profiles:
      - init
    mem_limit: ${ODOO_MEMORY_LIMIT:-512m}
    pids_limit: ${ODOO_PIDS_LIMIT:-150}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?database password required}
      SSO_SHARED_SECRET: ${ODOO_SSO_SECRET:?odoo sso secret required}
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    command:
      - odoo
      - server
      - -d
      - ${ODOO_DATABASE:-student_society}
      - -i
      - student_society
      - --without-demo=True
      - --stop-after-init
      - --db_host=db
      - --db_user=${POSTGRES_USER:-odoo}
      - --db_password=${POSTGRES_PASSWORD:?database password required}
    networks:
      - odoo-internal

volumes:
  odoo-db-data:
    name: odoo_odoo-db-data
  odoo-web-data:
    name: odoo_odoo-web-data

networks:
  caddy-odoo:
    external: true
  odoo-internal:
    driver: bridge
